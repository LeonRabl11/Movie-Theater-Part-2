<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./styles/styles.css" />
    <script type="module" src="journal.js"></script>

    <title>Movie theater | journal</title>
  </head>
  <body class="bg-black font-sans">
    <header
      class="flex p-[1rem] gap-[15rem] justify-center bg-[#121212] w-full py-[2rem] fixed"
    >
      <!--Logo on the top-left-->
      <div
        class="bg-[#F5C518] rounded-lg font-[900] flex justify-center items-center"
      >
        <p class="p-1 text-[1.2rem]">MOVIE||THEATER</p>
      </div>

      <!--menu subitems-->
      <ul class="flex gap-[3rem] items-center font-semibold">
        <li>
          <a
            href="../index.html"
            class="inline-block text-white no-underline bg-transparent px-3 py-1 transition duration-300 hover:drop-shadow-[0_0_8px_rgba(255,255,255,3)]"
          >
            Home
          </a>
        </li>
        <li>
          <a
            href="journal.html"
            class="inline-block text-white no-underline bg-transparent px-3 py-1 transition duration-300 hover:drop-shadow-[0_0_8px_rgba(255,255,255,3)]"
          >
            Journal
          </a>
        </li>
      </ul>
    </header>
    <main class="pt-[6rem]">
      <section>
        <div class="container mx-auto p-4">
          <h1 class="text-3xl font-bold mb-4 text-white">
            <span class="text-[#F5C518]">||</span>Favourite Movies
          </h1>
          <div
            id="favourite-movie-container"
            class="grid grid-cols-3 md:grid-cols-3 lg:grid-cols-5 gap-4"
          >
            <!-- movie cards will be populated here -->
          </div>
        </div>
      </section>
      <section></section>
    </main>
    <footer></footer>
